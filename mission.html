<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission - Wear Your Kind</title>
  <style>
    :root {
      --sage: #b8c9b9;
      --cream: #f4f1e8;
      --green: #5e9b69;
      --text: #111111;
      --max-width: 1280px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--cream);
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-header {
      background: var(--sage);
      padding: 36px 40px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .nav-wrap {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
    }

    .brand {
      flex: 0 0 auto;
    }

    .brand img {
      width: 140px;
      height: auto;
      margin-top: 4px;
    }

    .main-nav {
      flex: 1;
      display: flex;
      justify-content: center;
      gap: clamp(28px, 8vw, 140px);
      flex-wrap: wrap;
    }

    .main-nav a {
      font-size: clamp(1.1rem, 1.6vw, 1.4rem);
      font-weight: 400;
      line-height: 1.2;
      position: relative;
      padding: 6px 4px;
      transition: color .15s ease;
    }

    .main-nav a:hover {
      color: var(--green);
    }

    .mission-page {
      padding: 56px 24px 80px;
    }

    .mission-inner {
      max-width: 980px;
      margin: 0 auto;
      text-align: center;
    }

    .mission-inner h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: -0.02em;
    }

    .mission-inner p {
      margin: 0 0 32px;
      font-size: clamp(1.05rem, 1.6vw, 1.2rem);
      line-height: 1.45;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    .pdf-shell {
      background: #ffffff;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .pdf-shell iframe {
      width: 100%;
      height: 1100px;
      border: 0;
      display: block;
    }

    .pdf-link {
      display: inline-block;
      margin: 0 0 20px;
      color: var(--green);
      font-weight: 700;
    }

    .pdf-link:hover {
      color: #4b8757;
    }

    @media (max-width: 900px) {
      .site-header {
        padding: 22px 18px;
      }

      .nav-wrap {
        flex-direction: column;
        align-items: flex-start;
      }

      .main-nav {
        width: 100%;
        justify-content: flex-start;
        gap: 18px 34px;
      }

      .mission-page {
        padding: 42px 18px 64px;
      }

      .pdf-shell {
        padding: 12px;
      }

      .pdf-shell iframe {
        height: 72vh;
        min-height: 620px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="index.html" aria-label="Wear Your Kind home">
        <img src="logo.png" alt="Wear Your Kind logo" />
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="mission.html">Mission</a>
        <a href="#">Get Involved</a>
        <a href="#">Donate</a>
      </nav>
    </div>
  </header>

  <main class="mission-page">
    <div class="mission-inner">
      <h1>Our Mission</h1>
      <p>Learn more about the purpose, goals, and approach behind Wear Your Kind.</p>
      <a class="pdf-link" href="sell-sheet.pdf" target="_blank" rel="noopener noreferrer">Open the mission PDF in a new tab</a>

      <div class="pdf-shell">
        <iframe src="sell-sheet.pdf" title="Wear Your Kind mission PDF"></iframe>
      </div>
    </div>
  </main>
</body>
</html>
